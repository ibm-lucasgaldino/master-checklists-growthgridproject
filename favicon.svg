<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="15" fill="#667eea"/>
  
  <!-- Clipboard -->
  <rect x="20" y="15" width="60" height="75" rx="5" fill="#ffffff"/>
  
  <!-- Clip -->
  <rect x="35" y="10" width="30" height="8" rx="3" fill="#764ba2"/>
  
  <!-- Checkmarks -->
  <!-- First check -->
  <path d="M 30 35 L 35 40 L 45 30" stroke="#28a745" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Second check -->
  <path d="M 30 50 L 35 55 L 45 45" stroke="#28a745" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Third check -->
  <path d="M 30 65 L 35 70 L 45 60" stroke="#28a745" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Lines -->
  <line x1="50" y1="35" x2="70" y2="35" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="70" y2="50" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="65" x2="70" y2="65" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
</svg>

